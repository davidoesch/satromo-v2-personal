name: Run S2 Processor

on:
  schedule:
    - cron: '*/33 * * * *'
  workflow_dispatch:

concurrency:
  group: repo-actions
  cancel-in-progress: false

jobs:

  # ============================================================================
  # STAGE 1 — Lightweight check (github-hosted runner)
  # Queries the Copernicus STAC API for new S2 data and updates the CSV.
  # Sets needs-processing=true if any "Tiles ready awaiting GPU system run"
  # entry exists in the CSV after the check.
  # ============================================================================
  check-and-update:
    runs-on: ubuntu-24.04
    outputs:
      needs-processing: ${{ steps.check.outputs.needs-processing }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Increase git buffer size
        run: git config --global http.postBuffer 1048576000

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install light dependencies
        run: pip install requests pandas

      - name: Check S2 data availability and update CSV
        id: check
        run: python check_s2_sr.py $(date +%Y-%m-%d) 30
        #run: python check_s2_sr.py 2026-05-17 30

      - name: Push tools files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force tools/
          git diff --staged --quiet || git commit -m 'Tools files done'
          git pull --rebase origin main
          git push origin main

  # ============================================================================
  # STAGE 2a — Start EC2 runner (only when processing is needed)
  # Requires the following repository secrets and variables to be configured:
  #   Secrets:  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, GH_PAT,
  #             GOOGLE_CLIENT_SECRET, S3_SECRETS
  #   Variables: AWS_REGION, EC2_AMI_ID, EC2_INSTANCE_TYPE,
  #              EC2_SUBNET_ID, EC2_SECURITY_GROUP_ID
  
  # Type	    Name	                    Purpose
  # Secret	  AWS_ACCESS_KEY_ID	AWS     credentials for EC2 start/stop
  # Secret	  AWS_SECRET_ACCESS_KEY	    AWS credentials
  # Secret	  GH_PAT	                  Personal access token for the machulav runner action
  # Secret	  S3_SECRETS	              Existing processing secret
  # Secret	  COPERNICUS_S3_SECRETS	    Existing processing secret
  # Secret	  FSDI_STAC_USER	          Existing processing secret
  # Secret	  FSDI_STAC_PASSWORD	      Existing processing secret
  # Variable	AWS_REGION	              e.g. eu-central-1
  # Variable	EC2_AMI_ID	              Your pre-configured AMI with GDAL etc.
  # Variable	EC2_INSTANCE_TYPE	        e.g. g4dn.xlarge (GPU instance)
  # Variable	EC2_SUBNET_ID	VPC         subnet for the runner
  # Variable	EC2_SECURITY_GROUP_ID	    Security group allowing GitHub Actions traffic

  # ============================================================================
  start-ec2:
    needs: check-and-update
    if: ${{ needs.check-and-update.outputs.needs-processing == 'true' }}
    runs-on: ubuntu-24.04
    outputs:
      label: ${{ steps.start-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-runner.outputs.ec2-instance-id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Start EC2 runner
        id: start-runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ vars.EC2_AMI_ID }}
          ec2-instance-type: ${{ vars.EC2_INSTANCE_TYPE }}
          subnet-id: ${{ vars.EC2_SUBNET_ID }}
          security-group-id: ${{ vars.EC2_SECURITY_GROUP_ID }}


  # ============================================================================
  # STAGE 2b — Full processing on EC2 (7-hour hard limit for cost protection)
  # Runs rerun.py which picks up all "Tiles ready awaiting GPU system run"
  # entries (and other non-cloudy entries) from the CSV and processes them
  # using the full pipeline with GPU.
  # ============================================================================
  run-processing:
    needs: [check-and-update, start-ec2]
    runs-on: ${{ needs.start-ec2.outputs.label }}
    timeout-minutes: 420

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Link local_assets into workspace
        run: ln -s /home/ubuntu/local_assets $GITHUB_WORKSPACE/local_assets

      - name: Activate venv and install dependencies
        run: |
          source /home/ubuntu/.venv/bin/activate
          pip install -r requirements.txt
          echo "VIRTUAL_ENV=/home/ubuntu/.venv" >> $GITHUB_ENV
          echo "/home/ubuntu/.venv/bin" >> $GITHUB_PATH

      - name: Run rerun processor
        run: python rerun.py dev_config.py 
        env:
          S3_SECRETS: ${{ secrets.S3_SECRETS }}
          COPERNICUS_S3_SECRETS: ${{ secrets.COPERNICUS_S3_SECRETS }}
          FSDI_STAC_USER: ${{ secrets.FSDI_STAC_USER }}
          FSDI_STAC_PASSWORD: ${{ secrets.FSDI_STAC_PASSWORD }}         

      - name: Push tools files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force tools/
          git diff --staged --quiet || git commit -m 'Tools files done'
          git pull --rebase origin main
          git push origin main

  # ============================================================================
  # STAGE 2c — Stop EC2 runner (always runs if EC2 was started)
  # Runs even if run-processing failed or timed out, to prevent runaway costs.
  # ============================================================================
  stop-ec2:
    needs: [start-ec2, run-processing]
    runs-on: ubuntu-24.04
    if: ${{ always() && needs.start-ec2.result != 'skipped' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-ec2.outputs.label }}
          ec2-instance-id: ${{ needs.start-ec2.outputs.ec2-instance-id }}
